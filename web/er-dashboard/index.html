<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoFHIR - Emergency Department Triage</title>
<link rel="stylesheet" href="/static/triage.css">
</head>
<body>
<div id="app">
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <h1>GoFHIR</h1>
      <p class="subtitle">Emergency Department Triage System</p>
      <form id="login-form" autocomplete="off">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Login</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </div>
  </div>

  <div id="dashboard-screen" class="screen">
    <header class="dashboard-header">
      <h1>Emergency Department - Triage Board</h1>
      <div class="header-controls">
        <span id="user-info" class="user-badge"></span>
        <span id="board-count" class="board-count"></span>
        <a href="/reception" class="header-link">Registration</a>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search by name or MRN...">
      </div>
      <button id="search-btn">Search</button>
      <button id="checkin-btn" class="btn-primary">New Triage</button>
      <button id="refresh-btn">Refresh</button>
    </div>

    <div class="triage-board" id="triage-board">
      <div class="esi-column" data-level="1">
        <h2>ESI I <span class="esi-label">Resuscitation</span> <span class="esi-count">0</span></h2>
        <div class="patient-list" id="esi-1"></div>
      </div>
      <div class="esi-column" data-level="2">
        <h2>ESI II <span class="esi-label">Emergent</span> <span class="esi-count">0</span></h2>
        <div class="patient-list" id="esi-2"></div>
      </div>
      <div class="esi-column" data-level="3">
        <h2>ESI III <span class="esi-label">Urgent</span> <span class="esi-count">0</span></h2>
        <div class="patient-list" id="esi-3"></div>
      </div>
      <div class="esi-column" data-level="4">
        <h2>ESI IV <span class="esi-label">Less Urgent</span> <span class="esi-count">0</span></h2>
        <div class="patient-list" id="esi-4"></div>
      </div>
      <div class="esi-column" data-level="5">
        <h2>ESI V <span class="esi-label">Non-Urgent</span> <span class="esi-count">0</span></h2>
        <div class="patient-list" id="esi-5"></div>
      </div>
    </div>

    <div id="checkin-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn" data-modal="checkin-modal">&times;</span>
        <h2>Patient Triage Check-In</h2>
        <form id="checkin-form">
          <label for="checkin-patient-id">MRN or Patient Name</label>
          <input type="text" id="checkin-patient-id" placeholder="Search or enter Medical Record Number..." required>
          <div id="patient-suggestions" class="suggestions hidden"></div>
          <label for="chief-complaint">Presenting Complaint</label>
          <select id="chief-complaint" required>
            <option value="">Select complaint...</option>
            <option value="Chest pain">Chest Pain</option>
            <option value="Shortness of breath">Dyspnea / SOB</option>
            <option value="Abdominal pain">Abdominal Pain</option>
            <option value="Headache">Headache / Cephalgia</option>
            <option value="Trauma">Trauma / Injury</option>
            <option value="Fever">Fever / Hyperthermia</option>
            <option value="Altered mental status">Altered Mental Status</option>
            <option value="Bleeding">Hemorrhage / Bleeding</option>
            <option value="Falls">Mechanical Fall</option>
            <option value="Stroke symptoms">CVA Symptoms</option>
            <option value="Seizure">Seizure</option>
            <option value="Other">Other</option>
          </select>
          <button type="submit">Check In</button>
          <p id="checkin-error" class="error hidden"></p>
        </form>
      </div>
    </div>

    <div id="vitals-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn" data-modal="vitals-modal">&times;</span>
        <h2>Vital Signs Documentation</h2>
        <form id="vitals-form">
          <input type="hidden" id="vitals-patient-id">
          <label>Patient</label>
          <p id="vitals-patient-display" class="patient-display"></p>
          <label for="systolic">SBP (mmHg)</label>
          <input type="number" id="systolic" min="50" max="300" placeholder="Systolic" required>
          <label for="diastolic">DBP (mmHg)</label>
          <input type="number" id="diastolic" min="30" max="200" placeholder="Diastolic" required>
          <label for="heart-rate">Heart Rate (bpm)</label>
          <input type="number" id="heart-rate" min="20" max="250" placeholder="HR" required>
          <label for="resp-rate">Resp Rate (/min)</label>
          <input type="number" id="resp-rate" min="4" max="60" placeholder="RR" required>
          <label for="oxygen-sat">SpO2 (%)</label>
          <input type="number" id="oxygen-sat" min="50" max="100" placeholder="O2 sat" required>
          <label for="temperature">Temp (°C)</label>
          <input type="number" id="temperature" min="34" max="42" step="0.1" placeholder="Temp" required>
          <label for="pain-score">Pain Score (0-10)</label>
          <input type="number" id="pain-score" min="0" max="10" placeholder="0-10">
          <button type="submit">Save Vitals & Update ESI</button>
          <p id="vitals-error" class="error hidden"></p>
        </form>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
