<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoFHIR - Patient Registration</title>
<link rel="stylesheet" href="/static/triage.css">
</head>
<body>
<div id="app">
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <h1>GoFHIR</h1>
      <p class="subtitle">Patient Registration Desk</p>
      <form id="login-form" autocomplete="off">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Login</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </div>
  </div>

  <div id="dashboard-screen" class="screen">
    <header class="dashboard-header">
      <h1>Patient Registration</h1>
      <div class="header-controls">
        <span id="user-info" class="user-badge"></span>
        <a href="/er" class="header-link">ED Triage</a>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <div class="reception-body">
      <div class="form-panel">
        <form id="patient-form" autocomplete="off">
          <fieldset>
            <legend>Patient Identification</legend>
            <label for="patient-id">MRN *</label>
            <input type="text" id="patient-id" placeholder="e.g. MRN-2024-001" required>
            <label for="active-status">Record Status</label>
            <select id="active-status"><option value="true" selected>Active</option><option value="false">Inactive</option></select>
          </fieldset>

          <fieldset>
            <legend>Demographics</legend>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
              <div>
                <label for="given-name">First Name *</label>
                <input type="text" id="given-name" required>
              </div>
              <div>
                <label for="family-name">Last Name *</label>
                <input type="text" id="family-name" required>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.4rem;">
              <div>
                <label for="gender">Sex Assigned at Birth</label>
                <select id="gender">
                  <option value="male">Male</option>
                  <option value="female" selected>Female</option>
                  <option value="other">Other</option>
                  <option value="unknown">Unknown</option>
                </select>
              </div>
              <div>
                <label for="birth-date">DOB *</label>
                <input type="date" id="birth-date" required>
              </div>
            </div>
            <div style="margin-top:0.4rem;">
              <label for="marital-status">Marital Status</label>
              <select id="marital-status">
                <option value="">Unknown</option>
                <option value="M">Married</option>
                <option value="S">Single</option>
                <option value="D">Divorced</option>
                <option value="W">Widowed</option>
                <option value="P">Partnered</option>
              </select>
            </div>
          </fieldset>

          <fieldset>
            <legend>Contact Information</legend>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+1-555-123-4567">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="patient@example.com">
            <label for="address-line">Street Address</label>
            <input type="text" id="address-line" placeholder="123 Main St">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.4rem;">
              <div>
                <label for="city">City</label>
                <input type="text" id="city">
              </div>
              <div>
                <label for="state">State / Province</label>
                <input type="text" id="state">
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.4rem;">
              <div>
                <label for="postal-code">Postal Code</label>
                <input type="text" id="postal-code">
              </div>
              <div>
                <label for="country">Country</label>
                <input type="text" id="country" value="US">
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Emergency Contact</legend>
            <label for="ec-name">Name</label>
            <input type="text" id="ec-name">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.4rem;">
              <div>
                <label for="ec-relationship">Relationship</label>
                <input type="text" id="ec-relationship" placeholder="Spouse, Parent, Sibling">
              </div>
              <div>
                <label for="ec-phone">Phone</label>
                <input type="tel" id="ec-phone">
              </div>
            </div>
          </fieldset>

          <div class="form-actions">
            <button type="submit" id="save-btn">Register Patient</button>
            <button type="reset" id="reset-btn" class="btn-secondary">Clear</button>
          </div>
          <p id="form-status" class="form-status"></p>
        </form>
      </div>

      <div class="preview-panel">
        <div>
          <h3 style="font-size:0.85rem;margin-bottom:0.5rem;">Patient Preview</h3>
          <div id="patient-preview" class="preview-card">
            <p class="muted">Complete form to preview patient record.</p>
          </div>
        </div>
        <div>
          <h3 style="font-size:0.85rem;margin-bottom:0.4rem;">Patient Lookup</h3>
          <div style="display:flex;gap:4px;margin-bottom:6px;">
            <input type="text" id="search-id" placeholder="MRN or Name" style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:0.75rem;">
            <button id="search-btn" style="padding:5px 10px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.75rem;">Search</button>
            <button id="refresh-list-btn" style="padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:0.75rem;">All</button>
          </div>
          <div id="patient-list" class="patient-list-box">
            <p class="muted">No patients loaded.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>
</div>

<script src="/static/reception.js"></script>
</body>
</html>
